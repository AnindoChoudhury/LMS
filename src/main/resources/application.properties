spring.application.name=LMS
# Server Port
server.port=8080

# Database Connection (Make sure to create a database named 'lms_db' in MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/lms_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password

# Hibernate & JPA properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Secret (We will use this later for security)
jwt.secret=mySuperSecretKeyThatNeedsToBeLongEnoughToWorkProperlyWithHS256
jwt.expiration=86400000